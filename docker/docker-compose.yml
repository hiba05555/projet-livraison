# =============================================================================
# VRP Platform – Auth Service Stack
# Services: Keycloak (8090) + PostgreSQL (Keycloak) + PostgreSQL (app) + Redis + auth-service
# Keycloak est sur le port 8090 pour ne pas entrer en conflit avec l'API Gateway (8080)
# =============================================================================

services:

  # ── Keycloak (port 8090) ──────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: vrp-keycloak
    command: start-dev --import-realm --http-port=8090
    environment:
      KEYCLOAK_ADMIN:           admin
      KEYCLOAK_ADMIN_PASSWORD:  admin
      KC_DB:                    postgres
      KC_DB_URL:                jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME:           keycloak
      KC_DB_PASSWORD:           keycloak_pass
      KC_HTTP_PORT:             8090
      KC_HOSTNAME_STRICT:       "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_LOG_LEVEL:             INFO
      KC_HEALTH_ENABLED:        "true"
      KC_METRICS_ENABLED:       "true"
    ports:
      - "8090:8090"
    volumes:
      - ../src/main/resources/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - vrp-network
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          exec 3<>/dev/tcp/localhost/8090 \
          && printf 'GET /realms/master HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 \
          && head -1 <&3 | grep -q '200' \
          && exec 3>&-
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── Keycloak DB ────────────────────────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: vrp-keycloak-db
    environment:
      POSTGRES_DB:       keycloak
      POSTGRES_USER:     keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - vrp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vrp-auth-db
    environment:
      POSTGRES_DB:       vrp_auth
      POSTGRES_USER:     vrp_auth
      POSTGRES_PASSWORD: vrp_auth_pass
    ports:
      - "5432:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    networks:
      - vrp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrp_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis – token blacklist ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: vrp-redis
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    networks:
      - vrp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: vrp-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE:  docker
      DB_URL:                  jdbc:postgresql://postgres:5432/vrp_auth
      DB_USER:                 vrp_auth
      DB_PASSWORD:             vrp_auth_pass
      REDIS_HOST:              redis
      REDIS_PORT:              6379
      KEYCLOAK_URL:            http://keycloak:8090
      KEYCLOAK_REALM:          vrp
      KEYCLOAK_CLIENT_ID:      auth-service
      KEYCLOAK_CLIENT_SECRET:  auth-service-secret-change-in-prod
      KEYCLOAK_ISSUER_URI:     http://keycloak:8090/realms/vrp
      KEYCLOAK_ADMIN_USER:     admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      ALLOWED_ORIGINS:         http://localhost:3000,http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - vrp-network
    restart: unless-stopped

volumes:
  keycloak_db_data:
  app_db_data:

networks:
  vrp-network:
    driver: bridge
    name: vrp-network
