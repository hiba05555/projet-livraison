server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: auth-service

  # ── PostgreSQL ────────────────────────────────────────────────────────
  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/vrp_auth}
    username: ${DB_USER:vrp_auth}
    password: ${DB_PASSWORD:vrp_auth_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size:  10
      minimum-idle:       2
      pool-name: AuthServiceHikariPool

  # ── JPA / Hibernate ───────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Flyway ────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis – blacklist des tokens révoqués ─────────────────────────────
  data:
    redis:
      host:     ${REDIS_HOST:localhost}
      port:     ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout:  2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle:   8
          min-idle:   2

  # ── OAuth2 Resource Server ────────────────────────────────────────────
  # L'auth-service valide les JWT pour ses propres endpoints protégés.
  # Le login se fait directement entre le SPA et Keycloak (PKCE).
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:  ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/vrp}
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/vrp}/protocol/openid-connect/certs

# ── Keycloak Admin API ────────────────────────────────────────────────────
# Utilisé uniquement pour la gestion des utilisateurs (register, assign role, etc.)
# PAS utilisé pour le login — c'est Keycloak qui gère directement via PKCE.
keycloak:
  server-url:    ${KEYCLOAK_URL:http://localhost:8090}
  realm:         ${KEYCLOAK_REALM:vrp}
  client-id:     ${KEYCLOAK_CLIENT_ID:auth-service}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:auth-service-secret-change-in-prod}
  admin:
    username: ${KEYCLOAK_ADMIN_USER:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  info:
    env:
      enabled: true

info:
  app:
    name:        ${spring.application.name}
    description: "VRP Platform – Auth Service (PKCE / Keycloak)"
    version:     "@project.version@"

# ── SpringDoc / Swagger ───────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path:                    /swagger-ui.html
    tags-sorter:             alpha
    operations-sorter:       alpha
    display-request-duration: true
    try-it-out-enabled:      true     # active "Try it out" par défaut
    filter:                  true     # barre de recherche des endpoints
    oauth:
      client-id:     vrp-frontend
      use-pkce-with-authorization-code-grant: true

# ── Application ───────────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
