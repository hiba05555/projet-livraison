# Profile: docker
# Used inside Docker Compose. Service hostnames match docker-compose service names.

spring:
  datasource:
    url:      jdbc:postgresql://postgres:5432/vrp_auth
    username: vrp_auth
    password: ${DB_PASSWORD}

  data:
    redis:
      host:     redis
      port:     6379
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8090/realms/vrp

keycloak:
  server-url:    http://keycloak:8090
  client-secret: ${KEYCLOAK_CLIENT_SECRET:auth-service-secret-change-in-prod}

logging:
  level:
    com.vrp: DEBUG
    org.springframework.security: INFO
